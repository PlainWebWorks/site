<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Plain Web Works — Business Card</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e8e8e4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 0.3in;
      padding: 0.5in;
    }

    .card {
      width: 3.5in;
      height: 2in;
      background: #fff;
      display: flex;
      box-shadow: 0 6px 32px rgba(0,0,0,0.18);
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Left green band */
    .band {
      width: 0.82in;
      background: #315f4b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .band-mark {
      width: 38px;
      height: 38px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 900;
      color: #fff;
    }

    /* Right content area */
    .content {
      flex: 1;
      padding: 0.2in 0.15in 0.18in 0.19in;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 0.1in;
    }

    .content-main {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 1;
    }

    .qr-col {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .qr-col svg {
      width: 0.72in;
      height: 0.72in;
    }

    .business-name {
      font-size: 7.5px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #315f4b;
    }

    .person {
      margin-top: 2px;
    }

    .person-name {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #17211d;
      line-height: 1.1;
    }

    .person-title {
      font-size: 9px;
      font-weight: 600;
      color: #5b6861;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .contact-item {
      font-size: 9px;
      color: #3d4f47;
      display: flex;
      align-items: center;
      gap: 5px;
      line-height: 1;
    }

    .contact-item::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #315f4b;
      flex-shrink: 0;
    }

    @media print {
      @page { size: letter; margin: 0; }
      body {
        background: #fff;
        padding: 0;
        min-height: 11in;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card { box-shadow: none; }
    }
  </style>
</head>
<body>

    <div class="band">
      <div class="band-mark">P</div>
    </div>
    <div class="content">
      <div class="content-main">
        <div>
          <p class="business-name">Plain Web Works</p>
          <div class="person">
            <p class="person-name">Mike Hawkes</p>
            <p class="person-title">Owner</p>
          </div>
        </div>
        <div class="contact">
          <span class="contact-item">(803) 594-2461</span>
          <span class="contact-item">hello@plainwebworks.co</span>
          <span class="contact-item">plainwebworks.co</span>
