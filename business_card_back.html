<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Plain Web Works — Business Card Back</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a201c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 0.5in;
    }

    .card {
      width: 3.5in;
      height: 2in;
      background: #232a25;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.14in;
      box-shadow: 0 6px 32px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    .mark {
      width: 52px;
      height: 52px;
      background: #1e3d2b;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 900;
      color: #fff;
    }

    .motto {
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #5ec99a;
      text-align: center;
      line-height: 1.5;
    }

    @media print {
      @page { size: letter; margin: 0; }
      * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      body {
        background: #fff;
        padding: 0;
        min-height: 11in;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
      }
      .card { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">P</div>
    <p class="motto">No lock-in. No hostage websites.</p>
  </div>
</body>
</html>
